# Reusable signed-release workflow for Appegy UPM packages.
# Packs the package in src/ into a .tgz, signs it with the Unity UPM CLI, tags the version,
# and publishes a GitHub Release with auto-generated notes. Fully generic - no per-repo inputs.
#
# Caller (in a package repo):
#   on: workflow_dispatch
#   jobs:
#     release:
#       uses: Appegy/upm-ci/.github/workflows/release.yml@v1
#       secrets: inherit
#
# The caller must define secrets UPM_SERVICE_ACCOUNT_KEY_ID / UPM_SERVICE_ACCOUNT_KEY_SECRET /
# UPM_ORG_ID (repo- or org-level) and pass them via `secrets: inherit`.

name: Release (reusable)

on:
  workflow_call:

permissions:
  contents: write

jobs:
  release:
    name: Pack, sign and release
    runs-on: ubuntu-latest
    env:
      UPM_SERVICE_ACCOUNT_KEY_ID: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_ID }}
      UPM_SERVICE_ACCOUNT_KEY_SECRET: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_SECRET }}
      UPM_ORG_ID: ${{ secrets.UPM_ORG_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Pull real LFS blobs (some packages ship binaries via LFS, e.g. source-generator
          # DLLs). Without this the working tree holds 130-byte pointer files and `upm pack`
          # would publish those instead of the actual binary.
          lfs: true

      - name: Read package version
        id: pkg
        run: |
          VERSION="$(jq -r .version src/package.json)"
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "No version found in src/package.json"; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"

      - name: Ensure tag does not already exist
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.pkg.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.pkg.outputs.tag }} already exists - bump the version before releasing."
            exit 1
          fi

      - name: Stage package contents
        run: |
          rm -rf pack out && mkdir -p pack out
          cp -R src/. pack/
          # README/LICENSE live at the repo root - fold them into the package.
          for f in README.md LICENSE; do
            if [ -f "$f" ]; then cp "$f" pack/; fi
          done
          # README references images/ with relative paths - ship them so it renders in Package Manager.
          # (if form, not `[ -d images ] && ...`: under `bash -e` a false test as the last command fails the step)
          if [ -d images ]; then cp -R images pack/; fi

      - name: Generate missing .meta files
        run: |
          # Unity ignores package assets that lack a .meta. src/ ships its own; the root-folded
          # README/LICENSE/images do not, so synthesize deterministic ones. The guid is md5 of
          # "<package-name>/<package-relative-path>" - namespacing by package name keeps it stable
          # across releases AND unique per package, so README/LICENSE/images don't collide when
          # several Appegy packages are installed in one Unity project (immutable PackageCache
          # can't reassign a duplicate guid - it just drops the asset).
          cd pack
          PKG="$(jq -r .name package.json)"
          find . -mindepth 1 \( -type f -o -type d \) ! -name '*.meta' | while read -r p; do
            [ -e "$p.meta" ] && continue
            rel="${p#./}"
            guid="$(printf '%s' "$PKG/$rel" | md5sum | cut -c1-32)"
            {
              echo "fileFormatVersion: 2"
              echo "guid: $guid"
              [ -d "$p" ] && echo "folderAsset: yes"
              echo "DefaultImporter:"
              echo "  externalObjects: {}"
              echo "  userData: "
              echo "  assetBundleName: "
              echo "  assetBundleVariant: "
            } > "$p.meta"
            echo "generated meta: $rel"
          done

      - name: Install Unity UPM CLI
        run: |
          curl -fsSL https://cdn.packages.unity.com/upm-cli/install.sh -o install.sh
          bash install.sh
          echo "$HOME/.upm/bin" >> "$GITHUB_PATH"

      - name: Pack and sign
        id: pack
        run: |
          upm pack ./pack --organization-id "$UPM_ORG_ID" --destination out
          TGZ="$(ls out/*.tgz out/*.tar.gz 2>/dev/null | head -1)"
          [ -n "$TGZ" ] || { echo "No archive produced by upm pack"; exit 1; }
          tar -tzf "$TGZ" | grep -qx 'package/package.json'        || { echo "Malformed package"; exit 1; }
          tar -tzf "$TGZ" | grep -qx 'package/.attestation.p7m'    || { echo "No .attestation.p7m - package is NOT signed"; exit 1; }
          echo "tgz=$TGZ" >> "$GITHUB_OUTPUT"
          echo "Signed $TGZ - contents:"; tar -tzf "$TGZ"

      - name: Create and push tag
        run: |
          git tag "${{ steps.pkg.outputs.tag }}"
          git push origin "${{ steps.pkg.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.pkg.outputs.tag }}" "${{ steps.pack.outputs.tgz }}" \
            --title "${{ steps.pkg.outputs.tag }}" \
            --generate-notes
